<section class="flex-1 bg-base-200">
  <app-hero
    backgroundClass="bg-gradient-to-b from-base-100 to-base-200"
    titleClass="text-primary"
    subtitleClass="text-neutral-content"
  >
    <h1 heroTitle>Contact</h1>
    <p heroSubtitle>
      I help teams and individuals turn ideas into working products. If that’s
      what you’re looking for, let’s connect.
    </p>
  </app-hero>

  <hr
    class="h-1 border-0 bg-gradient-to-r from-primary via-accent to-secondary"
  />

  <section
    class="w-full bg-gradient-to-b from-base-200 via-base-300 to-base-200 px-4 py-10 sm:px-6 md:py-14 lg:px-24 lg:py-20"
    aria-label="Contact form"
  >
    <app-contact-form
      [isSubmitting]="isSubmitting()"
      (formSubmitted)="submitForm($event, modalComponent)"
    />
  </section>
</section>

<app-modal #modalComponent></app-modal>

<nav
  class="navbar min-h-20 w-full bg-transparent/75 backdrop-blur-sm"
  [class.shadow-xs]="isScrolled()"
  aria-label="Primary"
>
  <div class="navbar-start"></div>

  <div class="navbar-center">
    <div class="join rounded-lg bg-base-300 drop-shadow-md">
      @for (item of navItems; track item.route) {
      <a
        class="btn join-item"
        [class.rounded-l-lg]="$first"
        [routerLink]="item.route"
        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        [routerLinkActive]="['btn-active', 'border-b-2', 'border-b-primary', 'text-primary']"
      >
        {{ item.label }}
      </a>
      } @if (version()) {
      <a
        class="btn join-item"
        [routerLink]="Route.BUILD_INFO"
        [routerLinkActive]="['btn-active', 'border-b-2', 'border-b-primary', 'text-primary']"
      >
        {{ version() }}
      </a>
      }

      <div
        #themeDropdown
        class="dropdown dropdown-bottom dropdown-end"
        [class.dropdown-open]="isThemeMenuOpen()"
      >
        <button
          type="button"
          class="btn join-item rounded-r-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-base-content/30"
          aria-haspopup="menu"
          [attr.aria-expanded]="isThemeMenuOpen()"
          (click)="toggleThemeMenu()"
          (keydown.escape)="closeThemeMenu()"
        >
          Theme
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.5"
            class="size-4"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m19.5 8.25-7.5 7.5-7.5-7.5"
            />
          </svg>
        </button>

        @if (isThemeMenuOpen()) {
        <div
          role="menu"
          class="dropdown-content mt-3 max-h-72 w-56 overflow-y-auto rounded-md border border-white/5 bg-base-200 shadow-md outline-1 outline-black/5"
        >
          <div class="flex flex-col gap-3 p-3">
            @for (theme of themes; track theme) {
            <button
              type="button"
              role="menuitemradio"
              class="btn rounded-md bg-base-100 py-3 focus:outline-none focus-visible:ring-2 focus-visible:ring-base-content/30"
              [attr.aria-checked]="theme === selectedTheme()"
              [appDataTheme]="theme"
              (click)="selectTheme(theme)"
            >
              <span class="flex h-full w-full items-center justify-between">
                <span class="flex items-center gap-1">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="1.5"
                    class="size-4"
                    [ngClass]="{ invisible: theme !== selectedTheme() }"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="m4.5 12.75 6 6 9-13.5"
                    />
                  </svg>

                  <span class="text-left font-semibold">{{ theme }}</span>
                </span>

                <span class="flex h-full flex-initial gap-1" aria-hidden="true">
                  <span class="rounded-box w-2 bg-primary"></span>
                  <span class="rounded-box w-2 bg-secondary"></span>
                  <span class="rounded-box w-2 bg-accent"></span>
                  <span class="rounded-box w-2 bg-neutral"></span>
                </span>
              </span>
            </button>
            }
          </div>
        </div>
        }
      </div>
    </div>
  </div>

  <div class="navbar-end"></div>
</nav>

<dialog #modal class="modal" aria-label="Theme selection">
  <div class="modal-box max-h-80 bg-base-200 p-0">
    <section aria-label="Available themes">
      <ul class="flex flex-col gap-3 p-3">
        @for (theme of themes; track theme) {
        <li>
          <button
            type="button"
            [appDataTheme]="theme"
            class="btn w-full bg-base-100 py-3"
            [attr.aria-pressed]="theme === selectedTheme()"
            (click)="selectTheme(theme)"
          >
            <span class="flex h-full w-full items-center justify-between">
              <span class="flex items-center gap-1">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="1.5"
                  class="size-4"
                  [class.invisible]="theme !== selectedTheme()"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="m4.5 12.75 6 6 9-13.5"
                  />
                </svg>

                <span class="text-left font-semibold">{{ theme }}</span>
              </span>

              <span class="flex h-full flex-initial gap-1" aria-hidden="true">
                <span class="rounded-box w-2 bg-primary"></span>
                <span class="rounded-box w-2 bg-secondary"></span>
                <span class="rounded-box w-2 bg-accent"></span>
                <span class="rounded-box w-2 bg-neutral"></span>
              </span>
            </span>
          </button>
        </li>
        }
      </ul>
    </section>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button type="submit" aria-label="Close theme selection">Close</button>
  </form>
</dialog>

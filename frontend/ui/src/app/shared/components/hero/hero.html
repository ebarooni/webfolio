<section class="pt-20" [ngClass]="backgroundClass()">
  <div
    class="flex flex-col items-center justify-center px-8 py-7 text-center sm:py-16 lg:px-24"
  >
    <h1 class="text-headline mb-4 font-extrabold" [ngClass]="titleClass()">
      <ng-content select="[heroTitle]"></ng-content>
    </h1>

    <p class="text-body max-w-2xl" [ngClass]="subtitleClass()">
      <ng-content select="[heroSubtitle]"></ng-content>
    </p>
  </div>
</section>

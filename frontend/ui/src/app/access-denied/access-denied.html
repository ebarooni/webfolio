<section
  class="flex-1 grid place-items-center p-4 sm:p-6 lg:p-8"
  aria-labelledby="access-denied-title"
>
  <article class="w-full max-w-md">
    <div class="card bg-base-200 shadow-md">
      <div class="card-body text-center gap-4">
        <h1
          id="access-denied-title"
          class="card-title text-error text-subtitle justify-center"
        >
          Access Denied
        </h1>

        <p class="text-body text-base-content">
          This website is not available in your region.
        </p>

        <form
          class="mx-auto w-full max-w-sm space-y-4"
          (ngSubmit)="submit()"
          novalidate
        >
          <input
            type="password"
            class="input input-bordered w-full"
            placeholder="Password"
            autocomplete="current-password"
            [value]="password()"
            (input)="updatePassword($event)"
            [attr.aria-invalid]="!isPasswordValid()"
          />

          <button
            type="submit"
            class="btn btn-primary w-full"
            [disabled]="!isPasswordValid()"
          >
            Submit
          </button>
        </form>
      </div>
    </div>
  </article>
</section>
